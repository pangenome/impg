name: CI

on:
  push:
    branches: [ main, welcome-wfmash ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  PORTABLE: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake zlib1g-dev libzstd-dev libbz2-dev liblzma-dev libcurl4-gnutls-dev libhts-dev libgsl-dev libjemalloc-dev
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install zstd cmake xz gcc libomp htslib gsl jemalloc
            echo "CFLAGS=-I$(brew --prefix zstd)/include -I$(brew --prefix libomp)/include -I$(brew --prefix htslib)/include -I$(brew --prefix gsl)/include -I$(brew --prefix jemalloc)/include" >> $GITHUB_ENV
            echo "LDFLAGS=-L$(brew --prefix zstd)/lib -L$(brew --prefix libomp)/lib -L$(brew --prefix htslib)/lib -L$(brew --prefix gsl)/lib -L$(brew --prefix jemalloc)/lib" >> $GITHUB_ENV
            echo "CPPFLAGS=-I$(brew --prefix zstd)/include -I$(brew --prefix libomp)/include -I$(brew --prefix htslib)/include -I$(brew --prefix gsl)/include -I$(brew --prefix jemalloc)/include" >> $GITHUB_ENV
            echo "CMAKE_PREFIX_PATH=$(brew --prefix htslib);$(brew --prefix gsl);$(brew --prefix jemalloc);$(brew --prefix libomp);$(brew --prefix zstd)" >> $GITHUB_ENV
            echo "CMAKE_INCLUDE_PATH=$(brew --prefix htslib)/include:$(brew --prefix gsl)/include:$(brew --prefix jemalloc)/include:$(brew --prefix libomp)/include" >> $GITHUB_ENV
            echo "CMAKE_LIBRARY_PATH=$(brew --prefix htslib)/lib:$(brew --prefix gsl)/lib:$(brew --prefix jemalloc)/lib:$(brew --prefix libomp)/lib" >> $GITHUB_ENV
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust

      - name: Build
        run: cargo build --release

      - name: Verify companion binaries
        run: |
          echo "Checking companion binaries in target/release/..."
          for bin in gfaffix wfmash FastGA FAtoGDB GIXmake GIXrm ALNtoPAF PAFtoALN ONEview; do
            if [ -f "target/release/$bin" ]; then
              echo "  OK: $bin"
            else
              echo "  MISSING: $bin"
            fi
          done
          # gfaffix and wfmash are required
          test -f target/release/gfaffix || (echo "FAIL: gfaffix not found" && exit 1)
          test -f target/release/wfmash || (echo "FAIL: wfmash not found" && exit 1)

      - name: Smoke test gfaffix
        run: |
          printf "H\tVN:Z:1.0\nS\t1\tACGT\nS\t2\tACGT\nS\t3\tTTTT\nL\t1\t+\t3\t+\t0M\nL\t2\t+\t3\t+\t0M\n" > /tmp/test.gfa
          target/release/gfaffix /tmp/test.gfa -o /tmp/out.gfa
          grep -q "^S" /tmp/out.gfa && echo "gfaffix OK"

      - name: Smoke test wfmash
        run: |
          gunzip -c tests/test_data/yeast.chrV.fa.gz > /tmp/yeast.chrV.fa
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export LD_LIBRARY_PATH="target/release:$LD_LIBRARY_PATH"
          else
            export DYLD_LIBRARY_PATH="target/release:$DYLD_LIBRARY_PATH"
          fi
          target/release/wfmash /tmp/yeast.chrV.fa -X -s5000 > /tmp/wfmash.paf
          test $(wc -l < /tmp/wfmash.paf) -gt 0 && echo "wfmash OK: $(wc -l < /tmp/wfmash.paf) alignments"

      - name: Smoke test FastGA
        run: |
          target/release/FastGA /tmp/yeast.chrV.fa /tmp/yeast.chrV.fa > /tmp/fastga.paf
          test $(wc -l < /tmp/fastga.paf) -gt 0 && echo "FastGA OK: $(wc -l < /tmp/fastga.paf) alignments"

      - name: Test
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export LD_LIBRARY_PATH="target/release:$LD_LIBRARY_PATH"
          else
            export DYLD_LIBRARY_PATH="target/release:$DYLD_LIBRARY_PATH"
          fi
          export TMPDIR="${{ runner.temp }}"
          cargo test --release -- --test-threads=1
